<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Saeed Jan | 3D Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        .light-mode {
            --bg-color: #f0f0f0;
            --text-color: #1a1a1a;
            --glass-bg: rgba(0, 0, 0, 0.05);
            --border-color: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.5s, color 0.5s; }
        
        body { 
            background: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Poppins', sans-serif; 
            overflow: hidden; 
        }

        #bg { position: fixed; top: 0; left: 0; z-index: -1; }

        /* Dark/Light Toggle Button */
        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background: var(--glass-bg);
            color: var(--text-color);
            backdrop-filter: blur(10px);
            cursor: pointer;
            font-weight: 600;
            z-index: 100;
            outline: none;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
        }

        .content { text-align: center; animation: fadeIn 1.5s ease-out; }

        h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 800;
            background: linear-gradient(45deg, #00f2fe, #7000ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.8;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <button id="theme-toggle">Switch Mode</button>
    <canvas id="bg"></canvas>

    <div class="container">
        <div class="content">
            <h1>M Saeed Jan</h1>
            <p>Creative Developer</p>
        </div>
    </div>

    <script>
        // Theme Toggle Logic
        const btn = document.getElementById('theme-toggle');
        btn.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            // Update 3D object color based on mode
            const isLight = document.body.classList.contains('light-mode');
            torusKnot.material.color.setHex(isLight ? 0x7000ff : 0x00f2fe);
        });

        // Three.js Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#bg'), antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.setZ(30);

        // 3D Object
        const geometry = new THREE.TorusKnotGeometry(10, 2.5, 150, 16);
        const material = new THREE.MeshStandardMaterial({ color: 0x00f2fe, wireframe: true });
        const torusKnot = new THREE.Mesh(geometry, material);
        scene.add(torusKnot);

        // Lighting
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(20, 20, 20);
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(pointLight, ambientLight);

        function animate() {
            requestAnimationFrame(animate);
            torusKnot.rotation.x += 0.005;
            torusKnot.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
